kind = "web"
previewPath = "/"
title = "USA Storm Roofing"
version = "1.0.0"
id = "artifacts/usa-storm-roofing"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21854

[services.development]
run = "pnpm --filter @workspace/usa-storm-roofing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/usa-storm-roofing", "run", "build" ]
serve = "static"
publicDir = "artifacts/usa-storm-roofing/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21854"
BASE_PATH = "/"
